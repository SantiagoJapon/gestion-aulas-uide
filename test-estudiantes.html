<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargar Estudiantes - UIDE</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 600px; margin: 0 auto; }
        h1 { color: #004AAD; }
        input, button { margin: 10px 0; padding: 10px; width: 100%; }
        button { background: #004AAD; color: white; border: none; cursor: pointer; }
        button:hover { background: #0066CC; }
        #resultado { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>ðŸ“š Cargar Excel de Estudiantes</h1>
    
    <input type="text" id="periodo" placeholder="PerÃ­odo" value="SEM LOJA OCT 2025 â€“ FEB 2026">
    <input type="file" id="archivo" accept=".xlsx,.xls">
    <button onclick="subirExcel()">ðŸš€ Subir Excel</button>
    
    <div id="resultado"></div>

    <script>
        async function subirExcel() {
            const archivo = document.getElementById('archivo').files[0];
            const periodo = document.getElementById('periodo').value;
            const resultado = document.getElementById('resultado');
            
            if (!archivo) {
                alert('Selecciona un archivo');
                return;
            }
            
            resultado.innerHTML = 'â³ Procesando...';
            
            try {
                // Convertir a base64
                const base64 = await fileToBase64(archivo);
                
                // Enviar a n8n
                const response = await fetch('http://localhost:5678/webhook-test/estudiantes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ archivo: base64, periodo })
                });
                
                const data = await response.json();
                
                if (data.exito) {
                    resultado.className = 'success';
                    resultado.innerHTML = `
                        <h3>âœ… ${data.mensaje}</h3>
                        <p><strong>Procesados:</strong> ${data.estadisticas.total_procesados}</p>
                        <p><strong>Activos:</strong> ${data.estadisticas.estudiantes_activos}</p>
                        <p><strong>Nuevos/Actualizados:</strong> ${data.estadisticas.nuevos_o_actualizados}</p>
                        <p><strong>Marcados inactivos:</strong> ${data.estadisticas.marcados_como_inactivos}</p>
                    `;
                } else {
                    resultado.className = 'error';
                    resultado.innerHTML = `<h3>âŒ Error</h3><p>${data.mensaje}</p>`;
                }
            } catch (error) {
                resultado.className = 'error';
                resultado.innerHTML = `<h3>âŒ Error</h3><p>${error.message}</p>`;
            }
        }
        
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
