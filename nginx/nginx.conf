# ============================================
# Nginx Reverse Proxy - Gestion Aulas UIDE
# ============================================

upstream backend {
    server backend:3000;
}

# Redirect HTTP -> HTTPS (descomentar cuando tengas SSL)
# server {
#     listen 80;
#     server_name ${DOMAIN};
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;

    # --- SSL (descomentar cuando tengas certificado) ---
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # --- Headers de seguridad ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # --- Certbot challenge (para Let's Encrypt) ---
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --- API: Proxy al backend ---
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generales
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }

    # --- Distribución: timeout extendido (n8n puede tardar hasta 3 min + fallback local) ---
    location ~ ^/api/distribucion/(ejecutar|forzar) {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 10M;
    }

    # --- Health check del backend ---
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # --- Admin pages servidas por backend ---
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Frontend: archivos estaticos ---
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache de assets estaticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
