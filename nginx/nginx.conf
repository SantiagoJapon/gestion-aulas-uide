# ============================================
# Nginx Reverse Proxy - Gestion Aulas UIDE
# ============================================

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name miespacioideal.es www.miespacioideal.es;

    # Certbot challenge (renovación SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name miespacioideal.es www.miespacioideal.es;

    # --- SSL ---
    ssl_certificate /etc/letsencrypt/live/miespacioideal.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/miespacioideal.es/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Headers de seguridad ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # --- Resolver Docker interno para resolución lazy de upstreams ---
    resolver 127.0.0.11 valid=10s;
    set $backend_host backend:3000;

    # --- API: Proxy al backend ---
    location /api/ {
        proxy_pass http://$backend_host;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }

    # --- Distribución: timeout extendido (n8n puede tardar hasta 3 min + fallback local) ---
    location ~ ^/api/distribucion/(ejecutar|forzar) {
        proxy_pass http://$backend_host;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 10M;
    }

    # --- Health check del backend ---
    location /health {
        proxy_pass http://$backend_host;
        proxy_set_header Host $host;
    }

    # --- n8n healthz (llamado sin prefijo desde el frontend de n8n) ---
    location = /healthz {
        resolver 127.0.0.11 valid=10s;
        set $n8n_upstream http://n8n:5678;
        proxy_pass $n8n_upstream;
        proxy_set_header Host $host;
    }

    # --- n8n Workflow Editor ---
    location /n8n/ {
        resolver 127.0.0.11 valid=10s;
        set $n8n_upstream http://n8n:5678;
        rewrite ^/n8n/(.*) /$1 break;
        proxy_pass $n8n_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 75s;
        proxy_buffering off;
    }

    # --- Frontend: archivos estaticos ---
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache de assets estaticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
