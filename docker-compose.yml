version: '3.8'

services:
  # Base de Datos PostgreSQL
  postgres:
    image: postgres:15
    container_name: gestion_aulas_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gestion_aulas
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - app_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d gestion_aulas" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Para n8n en modo queue
  redis:
    image: redis:7-alpine
    container_name: gestion_aulas_redis
    ports:
      - "6379:6379"
    networks:
      - app_network
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

