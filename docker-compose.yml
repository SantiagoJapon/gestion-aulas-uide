  #      - DB_NAME=gestion_aulas
  #      - DB_USER=postgres
  #      - DB_PASSWORD=postgres
  #      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/gestion_aulas
  #      - JWT_SECRET=${JWT_SECRET:-supersecreto123}
  #      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
  #      - AI_PROVIDER=${AI_PROVIDER:-anthropic}
  #      - N8N_WEBHOOK_URL=http://n8n:5678/webhook
  #      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
  #      - EVOLUTION_API_URL=http://evolution-api:8080
  #      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
  #      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-bot}
  #      - OPENAI_API_KEY=${OPENAI_API_KEY}
  #    ports:
  #      - "3000:3000"
  #    volumes:
  #      - ./backend:/app
  #      - /app/node_modules
  #      - ./backend/uploads:/app/uploads
  #    command: npm run dev
  #    depends_on:
  #      postgres:
  #        condition: service_healthy
  #      redis:
  #        condition: service_healthy
  #    networks:
  #      - app_network
  #    restart: always
  #
  #  # Frontend - React + Vite
  #  frontend:
  #    build: ./frontend
  #    container_name: gestion_aulas_frontend
  #    environment:
  #      - VITE_API_URL=http://localhost:3000
  #    ports:
  #      - "5173:80"
  #    depends_on:
  #      - backend
  #    networks:
  #      - app_network
  #    restart: always

  # n8n - Workflow Automation
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: gestion_aulas_n8n
    environment:
      # Autenticación básica (desactivada temporalmente)
      - N8N_BASIC_AUTH_ACTIVE=false
      # - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      # - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin123}

      # Configuración general
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=America/Guayaquil

      # Base de datos para n8n
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_db
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=postgres

      # Modo de ejecución regular (sin workers separados)
      - EXECUTIONS_MODE=regular
      # - QUEUE_BULL_REDIS_HOST=redis
      # - QUEUE_BULL_REDIS_PORT=6379

      # API Keys para servicios externos
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}

      # URLs de servicios
      - N8N_EDITOR_BASE_URL=http://localhost:5678

      # Task runner timeout (para algoritmos pesados con muchas clases)
      - N8N_RUNNERS_HEARTBEAT_INTERVAL=600
      - N8N_RUNNERS_TASK_TIMEOUT=600
      - N8N_RUNNERS_MAX_PAYLOAD=104857600

      # Para desarrollo
      - NODE_ENV=${NODE_ENV:-development}

    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
      - ./n8n/credentials:/home/node/.n8n/credentials
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network
    restart: always

  # Evolution API - WhatsApp Gateway
  evolution-api:
    image: evolution-api-dev:2.3.7
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgres://postgres:postgres@postgres:5432/evolution_db
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_LOCAL_ENABLED=true
      - QRCODE_LIMIT=30
      - CONFIG_SESSION_PHONE_CLIENT=Chrome
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - NODE_OPTIONS=--require /os-patch.js
      - TZ=America/Guayaquil
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,WEBHOOKS,WEBSOCKET
      - CORS_ORIGIN=*
      - CORS_METHODS=POST,GET,PUT,DELETE
    volumes:
      - evolution_store:/evolution/store
      - evolution_instances:/evolution/instances
      - ./os-patch.js:/os-patch.js:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  # WhatsApp Bot - Roomie
  whatsapp-bot:
    build: ./whatsapp-bot-aulas
    container_name: whatsapp_bot
    restart: always
    environment:
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=botuide
      - BOT_PORT=3020
      - BACKEND_URL=http://host.docker.internal:3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=gestion_aulas
      - DB_SSL=false
      - VOICE_API_KEY=${VOICE_API_KEY:-}
    volumes:
      - ./whatsapp-bot-aulas:/app
    ports:
      - "3020:3020"
    depends_on:
      - postgres
      - evolution-api
    networks:
      - app_network

volumes:
  postgres_data:
  n8n_data:
  evolution_store:
  evolution_instances:


networks:
  app_network:
    driver: bridge
