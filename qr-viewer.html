<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR WhatsApp – Roomie Bot</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1.5rem;
            padding: 2rem;
        }

        h1 {
            font-size: 1.8rem;
            color: #38bdf8;
            text-align: center;
        }

        p {
            color: #94a3b8;
            text-align: center;
            max-width: 480px;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 1rem;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
            max-width: 400px;
        }

        #status {
            font-size: 1rem;
            font-weight: 600;
            padding: 0.4rem 1rem;
            border-radius: 999px;
        }

        .status-connecting {
            background: #fbbf24;
            color: #000;
        }

        .status-qrcode {
            background: #34d399;
            color: #000;
        }

        .status-close {
            background: #f87171;
            color: #fff;
        }

        .status-open {
            background: #34d399;
            color: #000;
        }

        #qr-img {
            width: 250px;
            height: 250px;
            border-radius: 0.5rem;
            background: #fff;
        }

        #qr-placeholder {
            width: 250px;
            height: 250px;
            border-radius: 0.5rem;
            background: #0f172a;
            border: 2px dashed #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        #counter {
            font-size: 0.85rem;
            color: #64748b;
        }

        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            background: #7dd3fc;
        }

        #log {
            font-size: 0.78rem;
            color: #64748b;
            max-width: 400px;
            text-align: center;
            word-break: break-all;
        }

        .pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>

    <h1>🤖 Roomie Bot – Escanear QR</h1>
    <p>Esta página se actualiza automáticamente cada 10 segundos para obtener el código QR de WhatsApp.</p>

    <div class="card">
        <span id="status" class="status-close">⏳ Cargando...</span>
        <div id="qr-placeholder">📱</div>
        <img id="qr-img" style="display:none" alt="QR Code" />
        <div id="counter">Actualizando en: <span id="secs">10</span>s</div>
        <button onclick="fetchQR()">🔄 Actualizar ahora</button>
    </div>

    <div id="log">Iniciando...</div>

    <script>
        const API_URL = 'http://localhost:8080';
        const API_KEY = 'A28749A2-285C-400B-8B25-87F8AEC32A87';
        const INSTANCE = 'bot';

        let countdown = 10;
        let countdownTimer;

        function log(msg) {
            document.getElementById('log').textContent = msg;
            console.log(msg);
        }

        function setStatus(text, cls) {
            const el = document.getElementById('status');
            el.textContent = text;
            el.className = 'status-' + cls;
        }

        function showQR(base64) {
            const img = document.getElementById('qr-img');
            const ph = document.getElementById('qr-placeholder');
            if (base64) {
                img.src = base64.startsWith('data:') ? base64 : 'data:image/png;base64,' + base64;
                img.style.display = 'block';
                ph.style.display = 'none';
            } else {
                img.style.display = 'none';
                ph.style.display = 'flex';
            }
        }

        async function fetchQR() {
            clearInterval(countdownTimer);
            countdown = 10;
            log('Consultando estado de la instancia...');

            try {
                // 1. Verificar estado de la instancia
                const stateResp = await fetch(`${API_URL}/instance/connectionState/${INSTANCE}`, {
                    headers: { 'apikey': API_KEY }
                });
                const stateData = await stateResp.json();
                const state = stateData?.instance?.state || 'unknown';
                log(`Estado actual: ${state}`);

                if (state === 'open') {
                    setStatus('✅ Conectado', 'open');
                    showQR(null);
                    document.getElementById('qr-placeholder').textContent = '✅';
                    log('¡WhatsApp conectado correctamente! No necesitas escanear el QR.');
                    startCountdown();
                    return;
                }

                // 2. Intentar conectar para generar QR
                const connectResp = await fetch(`${API_URL}/instance/connect/${INSTANCE}`, {
                    headers: { 'apikey': API_KEY }
                });
                const connectData = await connectResp.json();
                log(`Connect response: ${JSON.stringify(connectData).substring(0, 100)}`);

                // Verificar si el response tiene QR directamente
                if (connectData?.qrcode?.base64 || connectData?.base64) {
                    const qrBase64 = connectData?.qrcode?.base64 || connectData?.base64;
                    setStatus('📷 Escanea el QR', 'qrcode');
                    showQR(qrBase64);
                    log('QR obtenido correctamente. Escanea con WhatsApp en tu teléfono.');
                } else if (connectData?.code) {
                    setStatus('📷 QR listo', 'qrcode');
                    // Algunos versiones devuelven el code como texto para generar QR
                    log(`QR Code (texto): ${connectData.code}`);
                    // Generar QR con API externa
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(connectData.code)}`;
                    const img = document.getElementById('qr-img');
                    img.src = qrUrl;
                    img.style.display = 'block';
                    document.getElementById('qr-placeholder').style.display = 'none';
                } else {
                    // 3. Verificar el estado nuevamente
                    setTimeout(async () => {
                        const state2Resp = await fetch(`${API_URL}/instance/connectionState/${INSTANCE}`, {
                            headers: { 'apikey': API_KEY }
                        });
                        const state2Data = await state2Resp.json();
                        const state2 = state2Data?.instance?.state || 'unknown';

                        if (state2 === 'open') {
                            setStatus('✅ Conectado', 'open');
                            log('¡WhatsApp conectado!');
                        } else if (state2 === 'connecting') {
                            setStatus('🔄 Conectando...', 'connecting');
                            log('Esperando QR... Se actualizará automáticamente');
                        } else {
                            setStatus('❌ Desconectado', 'close');
                            log(`Estado: ${state2}. Intentando reconectar en el próximo ciclo...`);
                        }
                    }, 3000);
                }

            } catch (err) {
                setStatus('⚠️ Error', 'close');
                log(`Error: ${err.message}. ¿Está Evolution API corriendo en localhost:8080?`);
            }

            startCountdown();
        }

        function startCountdown() {
            countdown = 10;
            document.getElementById('secs').textContent = countdown;
            clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                countdown--;
                document.getElementById('secs').textContent = countdown;
                if (countdown <= 0) {
                    clearInterval(countdownTimer);
                    fetchQR();
                }
            }, 1000);
        }

        // Iniciar
        fetchQR();
    </script>
</body>

</html>
