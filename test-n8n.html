<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test n8n - Gestión de Aulas UIDE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        h1 { 
            color: #333;
            margin-bottom: 5px;
            font-size: 24px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .form-group { 
            margin-bottom: 20px;
        }
        
        label { 
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        input[type="text"], 
        input[type="file"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        input[type="text"]:focus, 
        input[type="file"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        input[type="file"] {
            padding: 10px;
            cursor: pointer;
        }
        
        select {
            cursor: pointer;
            background: white;
        }
        
        button { 
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        button:hover:not(:disabled) { 
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active:not(:disabled) {
            transform: translateY(0);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        #resultado { 
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
            animation: slideIn 0.3s;
        }
        
        .exito { 
            background: #d4edda;
            border: 2px solid #c3e6cb;
            color: #155724;
        }
        
        .error { 
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
        }
        
        .loading {
            background: #fff3cd;
            border: 2px solid #ffeaa7;
            color: #856404;
        }
        
        .stat {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        
        .stat:last-child { border-bottom: none; }
        
        .stat-label { 
            color: #666; 
            font-size: 14px;
        }
        
        .stat-value { 
            color: #333; 
            font-weight: 600;
            font-size: 14px;
        }
        
        .stat-value.success { color: #28a745; }
        .stat-value.warning { color: #ffc107; }
        .stat-value.danger { color: #dc3545; }
        
        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            margin-top: 10px;
            max-height: 300px;
        }
        
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎓</div>
            <h1>Sistema de Gestión de Aulas</h1>
            <p class="subtitle">Universidad Internacional del Ecuador (UIDE)</p>
        </div>
        
        <form id="form">
            <div class="form-group">
                <label>📄 Archivo Excel de Planificación</label>
                <input type="file" id="archivo" accept=".xlsx,.xls" required>
            </div>
            
            <div class="form-group">
                <label>🏛️ Facultad / Carrera</label>
                <select id="facultad" required>
                    <option value="">Seleccione una facultad...</option>
                    <option value="Derecho">Derecho</option>
                    <option value="Informática">Informática</option>
                    <option value="Arquitectura">Arquitectura</option>
                    <option value="Psicología">Psicología</option>
                    <option value="Business">Business</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>📅 Ciclo Académico</label>
                <input type="text" id="ciclo" value="2025-1" placeholder="Ej: 2025-1" required>
            </div>
            
            <button type="submit" id="btnEnviar">
                📤 Procesar Planificación
            </button>
        </form>
        
        <div id="resultado"></div>
        
        <div class="footer">
            Test de Workflow n8n - Desarrollo
        </div>
    </div>
    
    <script>
        const form = document.getElementById('form');
        const btnEnviar = document.getElementById('btnEnviar');
        const resultado = document.getElementById('resultado');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const archivo = document.getElementById('archivo').files[0];
            const facultad = document.getElementById('facultad').value;
            const ciclo = document.getElementById('ciclo').value;
            
            if (!archivo) {
                alert('⚠️ Por favor selecciona un archivo Excel');
                return;
            }
            
            if (!facultad) {
                alert('⚠️ Por favor selecciona una facultad');
                return;
            }
            
            // Mostrar loading
            btnEnviar.disabled = true;
            btnEnviar.innerHTML = '<span class="spinner"></span>Procesando...';
            resultado.style.display = 'block';
            resultado.className = 'loading';
            resultado.innerHTML = `
                <strong>⏳ Procesando archivo...</strong>
                <p style="margin-top: 10px; font-size: 14px;">
                    Esto puede tomar unos segundos. Por favor espera.
                </p>
            `;
            
            try {
                // Convertir archivo a base64
                const reader = new FileReader();
                
                reader.onload = async (event) => {
                    const base64 = event.target.result.split(',')[1];
                    
                    console.log('📤 Enviando a n8n:', {
                        archivo: archivo.name,
                        tamaño: (archivo.size / 1024).toFixed(2) + ' KB',
                        facultad: facultad,
                        ciclo: ciclo
                    });
                    
                    const startTime = Date.now();
                    
                    // Enviar a n8n (asegúrate de que la URL coincida con tu webhook)
                    const response = await fetch('http://localhost:5678/webhook-test/procesar-planificacion', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            archivo: base64,
                            nombreArchivo: archivo.name,
                            facultad: facultad,
                            ciclo: ciclo
                        })
                    });
                    
                    const endTime = Date.now();
                    const duracion = ((endTime - startTime) / 1000).toFixed(2);
                    
                    console.log('⏱️ Tiempo de procesamiento:', duracion, 'segundos');
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const data = await response.json();
                    console.log('📥 Respuesta de n8n:', data);
                    
                    // Mostrar resultado
                    if (data.error) {
                        resultado.className = 'error';
                        resultado.innerHTML = `
                            <h3>❌ Error al procesar</h3>
                            <p style="margin-top: 10px;">${data.mensaje || 'Error desconocido'}</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        `;
                    } else {
                        // Buscar el resumen en la respuesta
                        const item = data[0] || data;
                        const resumen = item._resumen_total_clases ? item : null;
                        
                        if (resumen) {
                            const porcentaje = resumen._resumen_porcentaje || 0;
                            const estaCompleto = resumen._resumen_esta_completo;
                            
                            resultado.className = 'exito';
                            resultado.innerHTML = `
                                <h3>✅ ¡Planificación procesada correctamente!</h3>
                                <div style="margin-top: 15px;">
                                    <div class="stat">
                                        <span class="stat-label">🏛️ Facultad:</span>
                                        <span class="stat-value">${facultad}</span>
                                    </div>
                                    <div class="stat">
                                        <span class="stat-label">📅 Ciclo:</span>
                                        <span class="stat-value">${ciclo}</span>
                                    </div>
                                    <div class="stat">
                                        <span class="stat-label">📚 Total de clases:</span>
                                        <span class="stat-value">${resumen._resumen_total_clases}</span>
                                    </div>
                                    <div class="stat">
                                        <span class="stat-label">✅ Clases completas:</span>
                                        <span class="stat-value success">${resumen._resumen_completas}</span>
                                    </div>
                                    <div class="stat">
                                        <span class="stat-label">⚠️ Clases incompletas:</span>
                                        <span class="stat-value ${resumen._resumen_incompletas > 0 ? 'warning' : 'success'}">${resumen._resumen_incompletas}</span>
                                    </div>
                                    <div class="stat">
                                        <span class="stat-label">📊 Completitud:</span>
                                        <span class="stat-value ${porcentaje >= 95 ? 'success' : 'warning'}">${porcentaje}%</span>
                                    </div>
                                    <div class="stat">
                                        <span class="stat-label">🎯 Estado:</span>
                                        <span class="stat-value ${estaCompleto ? 'success' : 'warning'}">
                                            ${estaCompleto ? '✅ COMPLETO' : '⚠️ REQUIERE REVISIÓN'}
                                        </span>
                                    </div>
                                    <div class="stat">
                                        <span class="stat-label">⏱️ Tiempo de proceso:</span>
                                        <span class="stat-value">${duracion}s</span>
                                    </div>
                                </div>
                                ${!estaCompleto ? '<p style="margin-top: 15px; padding: 10px; background: #fff3cd; border-radius: 5px; font-size: 13px;">💡 Se enviará un email al director de carrera con los detalles de los datos faltantes.</p>' : ''}
                            `;
                        } else {
                            resultado.className = 'exito';
                            resultado.innerHTML = `
                                <h3>✅ Procesado correctamente</h3>
                                <pre>${JSON.stringify(data, null, 2)}</pre>
                            `;
                        }
                    }
                    
                    btnEnviar.disabled = false;
                    btnEnviar.innerHTML = '📤 Procesar Planificación';
                };
                
                reader.onerror = () => {
                    resultado.className = 'error';
                    resultado.innerHTML = `
                        <h3>❌ Error al leer el archivo</h3>
                        <p style="margin-top: 10px;">No se pudo leer el archivo Excel. Verifica que sea un archivo válido.</p>
                    `;
                    btnEnviar.disabled = false;
                    btnEnviar.innerHTML = '📤 Procesar Planificación';
                };
                
                reader.readAsDataURL(archivo);
                
            } catch (error) {
                console.error('❌ Error:', error);
                resultado.className = 'error';
                resultado.innerHTML = `
                    <h3>❌ Error de conexión</h3>
                    <p style="margin-top: 10px;"><strong>${error.message}</strong></p>
                    <p style="margin-top: 10px; font-size: 13px;">
                        Posibles causas:<br>
                        • n8n no está corriendo en http://localhost:5678<br>
                        • El workflow no está activado<br>
                        • El webhook path es incorrecto
                    </p>
                `;
                btnEnviar.disabled = false;
                btnEnviar.innerHTML = '📤 Procesar Planificación';
            }
        });
    </script>
</body>
</html>
